                </a>

                            </div>
                        </div>

                        <div class="cassette-window">
                            <div class="tape-strand"></div>

                            <div class="spool spool-left" id="spool-left">
                                <div class="spool-inner">
                                    <div class="spool-hub">
                                        <div class="spool-spoke"></div>
                                        <div class="spool-spoke"></div>
                                        <div class="spool-spoke"></div>
                                    </div>
                                </div>
                            </div>

                                        <div class="spool-spoke"></div>
