name: Update Gist Database

on:
  schedule:
    - cron: '0 * * * *' # Hourly
  workflow_dispatch: # Allow manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install -r api/requirements.txt
          
      - name: Run Sync Script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }} # Use a fine-grained token with Gist access
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GENIUS_CLIENT_ID: ${{ secrets.GENIUS_CLIENT_ID }}
          GENIUS_CLIENT_SECRET: ${{ secrets.GENIUS_CLIENT_SECRET }}
        run: python sync_data.py
