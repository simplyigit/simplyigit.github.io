<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema | Yigit</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css?v=2.2">
</head>

<body>
    <!-- Cinematic Dark Gradient Background for this page only -->
    <div
        style="position: fixed; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(20, 30, 48, 0.4) 0%, rgba(36, 59, 85, 0.1) 100%); z-index: -2; pointer-events: none;">
    </div>

    <div class="container fade-in">
        <header class="hero" style="align-items: center; text-align: center;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <a href="/" class="glass-card back-btn">
                    <span class="arrow" style="transform: rotate(180deg); margin-right: 8px;">→</span> Portfolio
                </a>

                <h1 style="font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0;">Cinema.</h1>

                <a href="https://letterboxd.com/oneyigit/" target="_blank" rel="noopener noreferrer"
                    class="glass-card repo-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="margin-right: 8px;">
                        <circle cx="6" cy="12" r="3" fill="#00e054" />
                        <circle cx="12" cy="12" r="3" fill="#40bcf4" />
                        <circle cx="18" cy="12" r="3" fill="#ff8000" />
                    </svg>
                    Letterboxd <span class="arrow" style="margin-left: 8px;">→</span>
                </a>
            </div>

            <p class="subtitle"
                style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--text-secondary); max-width: 600px; line-height: 1.6; margin-top: 8px;">
                A film is a petrified fountain of thought.<br>
                Synced from my <a href="https://letterboxd.com/oneyigit/" target="_blank" rel="noopener noreferrer"
                    style="color: var(--text-primary); text-decoration: none; border-bottom: 1px solid var(--accent-color);"><strong
                        style="color: #6883a7;">Letterboxd</strong></a>.
            </p>
        </header>

        <!-- All-Time Favorites -->
        <section class="section">
            <div class="section-eyebrow">Curated</div>
            <div class="section-title">All-Time Favorites</div>
            <div class="animated-filmstrip-container">
                <div id="movies-favorites-container" class="animated-filmstrip-track">
                    <p id="movies-loading"
                        style="color: var(--text-secondary); font-family: 'Playfair Display', serif; font-style: italic; padding: 20px 40px;">
                        Connecting to projector <span class="loading-dots">...</span></p>
                </div>
            </div>
        </section>

        <!-- Recent Watches -->
        <section class="section">
            <div class="section-eyebrow">Diary</div>
            <div class="section-title">Recent Watches</div>
            <div id="movies-recent-container" class="scroll-strip">
            </div>
        </section>

        <!-- Watchlist -->
        <section class="section">
            <div class="section-eyebrow">Up Next</div>
            <div class="section-title">Watchlist</div>
            <div id="movies-watchlist-container" class="scroll-strip">
            </div>
        </section>

        <footer>
            <p>&copy; 2026 yiğit.</p>
        </footer>
    </div>

    <script type="module" src="../assets/js/pages/cinema.js"></script>
</body>

</html>
