<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies | Yigit</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=2.1">
</head>

<body>
    <!-- Cinematic Dark Gradient Background for this page only -->
    <div style="position: fixed; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(20, 30, 48, 0.4) 0%, rgba(36, 59, 85, 0.1) 100%); z-index: -2; pointer-events: none;"></div>

    <div class="container fade-in">
        <section class="section" style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;">
            <a href="../index.html" class="glass-card back-btn">
                <span class="arrow" style="transform: rotate(180deg); margin-right: 8px;">→</span> Portfolio
            </a>

            <a href="https://letterboxd.com/oneyigit/" target="_blank" rel="noopener noreferrer" class="glass-card repo-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="margin-right: 8px;">
                    <circle cx="6" cy="12" r="3" fill="#00e054"/>
                    <circle cx="12" cy="12" r="3" fill="#40bcf4"/>
                    <circle cx="18" cy="12" r="3" fill="#ff8000"/>
                </svg>
                Letterboxd <span class="arrow" style="margin-left: 8px;">→</span>
            </a>
        </section>

        <header class="hero">
            <h1 style="font-family: 'Playfair Display', serif; font-size: 4rem;">Cinema.</h1>
            <p class="subtitle" style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--text-secondary); max-width: 600px; line-height: 1.6; margin-top: 12px;">
                "A film is a petrified fountain of thought."<br>
                Data synced directly from my Letterboxd diary.
            </p>
        </header>

        <!-- Block 1: Favorite Films -->
        <section class="section" style="margin-bottom: 80px;">
            <h2 class="section-title" style="font-family: 'Playfair Display', serif;">All-Time Favorites</h2>
            <div id="movies-favorites-container" class="movies-favorites-grid">
                <p id="movies-loading" style="color: var(--text-secondary); font-family: 'Playfair Display', serif; font-style: italic;">Connecting to projector <span class="loading-dots">...</span></p>
            </div>
        </section>

        <!-- Block 2: Recent Activity -->
        <section class="section" style="margin-bottom: 80px;">
            <h2 class="section-title" style="font-family: 'Playfair Display', serif;">Recent Watches</h2>
            <!-- Re-use the watchlist grid logic for beautifully dense walls of posters -->
            <div id="movies-recent-container" class="movies-watchlist-grid">
            </div>
        </section>
            
        <!-- Block 3: Watchlist -->
        <section class="section">
            <h2 class="section-title" style="font-family: 'Playfair Display', serif;">Watchlist</h2>
            <div id="movies-watchlist-container" class="movies-watchlist-grid">
            </div>
        </section>

        <footer>
            <p>&copy; 2026 yiğit.</p>
        </footer>
    </div>

    <script src="../script.js?v=2.1"></script>
</body>
</html>
